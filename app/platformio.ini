[env:esp32dev]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino 

monitor_speed = 115200

lib_deps = 
	; Per il Barometro MS5611
	RobTillaart/MS5611 @ ^0.4.0

	; Per l'IMU LSM6DSO32
    ;SparkFun LSM6DSO IMU ;non lo vede, da cambiare

	; Per il GPS MAX-M10S (u-blox)
	;SparkFun u-blox GNSS v3
