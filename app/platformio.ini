; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Opzioni comuni
[env]
; Community fork del platform-espressif32 originale (di PlatformIO):
; ci permette di avere il supporto (completo) a C++20
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
; Usiamo C++20 per avere il supporto a:
;   - macro: VAR_OPT(, )
;	- librerie standard:
;		- format
;		- string_view
build_flags = -std=c++20

; Build di debug: niente ottimizzazioni, simboli di debug e log di debug
[env:debug]
build_type = debug
build_flags = -D DEBUG=1

; Build di release: ottimizzazioni, niente simboli di debug,
; ma contiene ancora log di debug
[env:release]
build_flags = -D RELEASE=1

; Build di production: ottimizzazioni, niente simboli di debug,
; niente log di debug
[env:production]
build_flags = -D PRODUCTION=1
