name: PlatformIO Build

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Build examples using pio
        run: |
          examples_dir="$GITHUB_WORKSPACE/examples"

          for example in $(ls "$examples_dir"); do
            echo "[Build workflow]: Building example: $example"
            pio run -d "$examples_dir/$example" || {
              echo "[Build workflow]: Build failed for example: $example"
              exit 1
            }
          done
