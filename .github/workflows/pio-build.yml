name: PlatformIO Build

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      PR_NUMBER: ${{ github.event.number }}
      SOURCE_BRANCH: ${{ github.head_ref }}
      TARGET_BRANCH: ${{ github.base_ref }}
      GREEN: '\033[1;32m'
      YELLOW: '\033[1;33m'
      RED: '\033[1;31m'
      DONE: '\033[0m'

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Build examples using pio
        run: |
          examples_dir="$GITHUB_WORKSPACE/examples"

          # Itera le cartelle degli esempi
          for example in $(ls "$examples_dir"); do
            echo -e "$YELLOW[Info]: Building example: $example$DONE"
            pio run -d "$examples_dir/$example" || {
              # Se il comando pio run fallisce, esci con un errore
              echo -e "$RED[Error]: Build failed for example: $example$DONE"
              exit 1
            }
          done
          echo -e "$GREEN[Success]: All examples built successfully!$DONE"

      - name: "Build examples failure: comment on PR"
        if: ${{ failure() && github.event_name == 'pull_request' }}
        run: gh pr comment $PR_NUMBER --body "Error, build failed for one or more examples. Please check the logs for details."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
